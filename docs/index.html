<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Ecosystem — Complete Interactive Guide</title>
    <style>
        :root {
            --bg: #0d0d14;
            --slide-bg: #13131f;
            --slide-bg-2: #17172a;
            --accent: #7c6af7;
            --accent-2: #4ec9b0;
            --accent-3: #ff6b6b;
            --accent-4: #f9c74f;
            --text: #e8e8f4;
            --subtext: #9898b8;
            --muted: #55556a;
            --border: #252540;
            --indicator: #2a2a45;
            --indicator-active: #7c6af7;
            --btn-bg: #1e1e30;
            --btn-hover: #2a2a48;
            --shadow: 0 12px 60px rgba(0,0,0,0.7);
            --glow: 0 0 24px rgba(124,106,247,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            color: var(--text);
        }
        .slideshow-container {
            width: 92vw;
            max-width: 1200px;
            height: 82vh;
            max-height: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        /* ── HEADER BAR ── */
        .top-bar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }
        .top-bar .brand { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
        .top-bar .section-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
        .top-bar .slide-counter { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
        /* ── FULLSCREEN TOGGLE ── */
        .fullscreen-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .fullscreen-btn:hover { background: var(--btn-hover); border-color: var(--accent); }
        /* ── SLIDE AREA ── */
        .slide-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: var(--shadow);
            background: var(--slide-bg);
            border: 1px solid var(--border);
        }
        /* ── FULLSCREEN MODE ── */
        body.is-fullscreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
        }
        body.is-fullscreen .slideshow-container {
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
        }
        body.is-fullscreen .top-bar,
        body.is-fullscreen .controls,
        body.is-fullscreen .hint,
        body.is-fullscreen .accent-bar { display: none; }
        body.is-fullscreen .slide-wrapper { border-radius: 0; border: none; }
        body.is-fullscreen .slide { border-radius: 0; }
        /* ── INDIVIDUAL SLIDES ── */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 52px;
            background: var(--slide-bg);
            opacity: 0;
            transform: translateX(60px);
            transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
            border-radius: 18px;
            overflow: hidden;
        }
        .slide.active { opacity: 1; transform: translateX(0); pointer-events: all; z-index: 2; }
        .slide.exit-left { opacity: 0; transform: translateX(-60px); }
        .slide.exit-right { opacity: 0; transform: translateX(60px); }
        /* ── TYPOGRAPHY ── */
        .slide-title {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
            outline: none;
            border-bottom: 3px solid transparent;
            padding: 4px 16px;
            border-radius: 8px;
            transition: border-color 0.2s, background 0.2s;
            cursor: text;
            line-height: 1.25;
            letter-spacing: -0.02em;
            max-width: 900px;
        }
        .slide-title:focus { border-bottom-color: var(--accent); background: rgba(124,106,247,0.06); }
        .slide-title:hover { background: rgba(255,255,255,0.03); }
        .slide-subtitle {
            font-size: 0.95rem;
            color: var(--subtext);
            text-align: center;
            margin-bottom: 4px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        /* ── BODY CONTENT ── */
        .slide-body {
            font-size: 1rem;
            color: var(--subtext);
            text-align: center;
            max-width: 660px;
            outline: none;
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: border-color 0.2s, background 0.2s;
            cursor: text;
            line-height: 1.75;
            min-height: 32px;
        }
        .slide-body:focus { border-color: rgba(124,106,247,0.45); background: rgba(124,106,247,0.04); }
        .slide-body:hover { background: rgba(255,255,255,0.02); }
        .slide-body.left-align { text-align: left; max-width: 780px; }
        /* ── BADGE ── */
        .badge {
            display: inline-block;
            background: rgba(124,106,247,0.15);
            border: 1px solid rgba(124,106,247,0.35);
            color: var(--accent);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .badge.teal { background: rgba(78,201,176,0.12); border-color: rgba(78,201,176,0.3); color: var(--accent-2); }
        .badge.red  { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.3); color: var(--accent-3); }
        .badge.gold { background: rgba(249,199,79,0.12); border-color: rgba(249,199,79,0.3); color: var(--accent-4); }
        .badge.green { background: rgba(107,203,119,0.12); border-color: rgba(107,203,119,0.3); color: #6bcb77; }
        /* ── GRID ── */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            text-align: left;
            margin-top: 4px;
        }
        .grid-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .grid-card .card-title { font-size: 0.82rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        .grid-card .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .grid-card .card-desc { font-size: 0.78rem; color: var(--subtext); line-height: 1.5; }
        .grid-card .card-link { font-size: 0.72rem; color: var(--accent); text-decoration: none; margin-top: 2px; }
        .grid-card .card-link:hover { text-decoration: underline; }
        /* ── STAT ROW ── */
        .stat-row { display: flex; gap: 32px; justify-content: center; margin-top: 8px; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
        /* ── FEATURE LIST ── */
        .feature-list { display: flex; flex-direction: column; gap: 7px; width: 100%; max-width: 740px; margin-top: 4px; }
        .feature-item { display: flex; align-items: flex-start; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 0.85rem; color: var(--text); text-align: left; }
        .feature-item .feat-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
        .feature-item .feat-text { flex: 1; line-height: 1.5; }
        .feature-item .feat-text strong { color: #fff; font-weight: 600; }
        /* ── ASCII ART / DIAGRAM ── */
        .ascii-art { font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--accent-2); line-height: 1.4; text-align: left; white-space: pre; background: rgba(78,201,176,0.05); border: 1px solid rgba(78,201,176,0.15); border-radius: 10px; padding: 14px 18px; }
        .ascii-art .label { color: var(--accent-4); font-weight: bold; }
        .ascii-art .value { color: var(--text); }
        .ascii-art .dim { color: var(--muted); }
        /* ── IMAGE SLIDE ── */
        .slide-img { max-width: 90%; max-height: 65%; object-fit: contain; border-radius: 10px; border: 1px solid var(--border); }
        .img-caption { font-size: 0.75rem; color: var(--muted); margin-top: 6px; text-align: center; }
        /* ── IFRAME ── */
        .slide iframe.graph-embed { width: 100%; height: 100%; border: none; border-radius: 12px; background: var(--bg); }
        /* ── SECTION TAG ── */
        .section-tag {
            position: absolute;
            top: 14px;
            left: 18px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 8px;
        }
        /* ── SLIDE NUMBER ── */
        .slide-number { position: absolute; top: 14px; right: 18px; font-size: 0.65rem; color: var(--muted); }
        /* ── ACCENT DIVIDER ── */
        .accent-bar { width: 52px; height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 2px; margin: 0 auto; }
        /* ── CONTROLS ── */
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .btn:hover { background: var(--btn-hover); border-color: #5555aa; transform: scale(1.06); }
        .btn:active { transform: scale(0.93); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
        .btn.rst { width: auto; border-radius: 20px; padding: 0 14px; font-size: 0.8rem; background: #222; border-color: #444; }
        .indicators { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--indicator); cursor: pointer; transition: all 0.25s; border: none; }
        .dot:hover { background: #888; transform: scale(1.35); }
        .dot.active-dot { background: var(--indicator-active); width: 12px; height: 12px; box-shadow: 0 0 10px rgba(124,106,247,0.55); }
        /* ── HINT ── */
        .hint { color: rgba(255,255,255,0.28); font-size: 0.72rem; text-align: center; letter-spacing: 0.3px; }
        .hint kbd { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 4px; padding: 2px 6px; font-family: inherit; font-size: 0.68rem; margin: 0 1px; }
        /* ── WORKFLOW BOX ── */
        .workflow-box { background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.25); border-radius: 12px; padding: 16px 20px; text-align: left; max-width: 760px; }
        .workflow-step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-size: 0.85rem; }
        .step-num { background: var(--accent); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
        .step-text { color: var(--subtext); line-height: 1.5; }
        .step-text strong { color: var(--text); }
        /* ── LINK BUTTON ── */
        .link-btn { display: inline-block; background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.35); color: var(--accent); border-radius: 8px; padding: 6px 14px; font-size: 0.78rem; text-decoration: none; transition: all 0.2s; margin: 3px; }
        .link-btn:hover { background: rgba(124,106,247,0.25); border-color: var(--accent); }
        /* ── CATEGORY TAG ROW ── */
        .cat-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 700px; }
        .cat-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 0.68rem; color: var(--subtext); }
        /* ── CODE BLOCK ── */
        .code-block { font-family: 'Courier New', monospace; font-size: 0.75rem; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--accent-2); text-align: left; white-space: pre; max-width: 700px; overflow-x: auto; }
        /* ── THREE COLUMN ── */
        .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 900px; }
        .three-col .col-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: left; }
        .three-col .col-title { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
        .three-col .col-item { font-size: 0.75rem; color: var(--subtext); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .slideshow-container { width: 96vw; height: 65vh; }
            .slide { padding: 24px 18px; }
            .slide-title { font-size: 1.4rem; }
            .slide-body { font-size: 0.88rem; }
            .content-grid { grid-template-columns: 1fr; }
            .stat-row { gap: 18px; }
            .stat-num { font-size: 2rem; }
            .three-col { grid-template-columns: 1fr; }
        }
    </style>
</head>

                tag.className = 'section-tag';
                tag.textContent = data.section;

                const tc = document.createElement('div');
                tc.className = 'three-col';
                data.threeCol.forEach(col => {
                    const cd = document.createElement('div');
                    cd.className = 'col-card';
                    cd.innerHTML = `<div class="col-title">${col.title}</div>`;
                    col.items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'col-item';
                        row.textContent = item;
                        cd.appendChild(row);
                    });
                    tc.appendChild(cd);
                });
                el.appendChild(tc);
            }

            if (data.isEmbed && data.embedSrc) {
                const iframe = document.createElement('iframe');
                iframe.className = 'graph-embed';
                iframe.src = data.embedSrc;
                iframe.setAttribute('loading', 'lazy');
                el.appendChild(iframe);
            }

            slideWrapper.appendChild(el);
            slideElements.push(el);
        });
        updateIndicators();
        updateSectionLabel();
        updateCounter();
    }

    function updateAllData() {
        document.querySelectorAll('.slide').forEach((el, i) => {
            const title = el.querySelector('.slide-title');
            const body = el.querySelector('.slide-body');
            if (title && slides[i]) slides[i].title = title.innerHTML;
            if (body && slides[i]) slides[i].body = body.innerHTML;
        });
    }

    function updateData(i) {
        const el = slideElements[i];
        if (!el) return;
        const title = el.querySelector('.slide-title');
        const body = el.querySelector('.slide-body');
        if (title) slides[i].title = title.innerHTML;
        if (body) slides[i].body = body.innerHTML;
        saveSlides();
    }

    function goTo(index) {
        if (index < 0) index = 0;
        if (index >= slides.length) index = slides.length - 1;
        updateAllData();
        slideElements.forEach((el, i) => {
            el.classList.remove('active', 'exit-left', 'exit-right');
            if (i === index) {
                el.classList.add('active');
            } else if (i < index) {
                el.classList.add('exit-left');
            } else {
                el.classList.add('exit-right');
            }
        });
        currentIndex = index;
        updateIndicators();
        updateSectionLabel();
        updateCounter();
    }

    function nextSlide() { goTo(currentIndex + 1); }
    function prevSlide() { goTo(currentIndex - 1); }

    function updateIndicators() {
        indicatorsContainer.innerHTML = '';
        slides.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'dot' + (i === currentIndex ? ' active-dot' : '');
            dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
            dot.onclick = () => goTo(i);
            indicatorsContainer.appendChild(dot);
        });
    }

    function updateSectionLabel() {
        const section = slides[currentIndex]?.section || '';
        sectionLabel.textContent = SECTION_LABELS[section] || section;
    }

    function updateCounter() {
        slideCounter.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    function toggleFullscreen() {
        document.body.classList.toggle('is-fullscreen');
        const isFS = document.body.classList.contains('is-fullscreen');
        fullscreenBtn.textContent = isFS ? '⛶ Exit' : '⛶ Fullscreen';
    }

    // ─────────────────────────────────────────────────────
    //  KEYBOARD
    // ─────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        const active = document.activeElement;
        const isEditing = active && (active.contentEditable === 'true' || active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');

        if (e.code === 'Space' && !isEditing) {
            e.preventDefault();
            e.shiftKey ? prevSlide() : nextSlide();
            return;
        }
        if (e.code === 'KeyF' && !isEditing) {
            e.preventDefault();
            toggleFullscreen();
            return;
        }
        if ((e.code === 'ArrowRight') && !isEditing && !e.ctrlKey && !e.metaKey) { e.preventDefault(); nextSlide(); }
        if ((e.code === 'ArrowLeft') && !isEditing && !e.ctrlKey && !e.metaKey) { e.preventDefault(); prevSlide(); }
        if (e.code === 'Escape') {
            document.body.classList.remove('is-fullscreen');
            fullscreenBtn.textContent = '⛶ Fullscreen';
        }
    });

    fullscreenBtn.addEventListener('click', toggleFullscreen);

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // ─────────────────────────────────────────────────────
    //  TOUCH SWIPE
    // ─────────────────────────────────────────────────────
    let tx = 0;
    slideWrapper.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    slideWrapper.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 50) { dx < 0 ? nextSlide() : prevSlide(); }
    });

    // ─────────────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────────────
    renderAllSlides();
    console.log('✅ Hermes Guide v2 — 34 slides ready');
})();
</script>
</body>
</html>
